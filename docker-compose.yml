services:
  ollama:
    image: ollama/ollama:latest
    container_name: agent-ollama
    ports:
      - "11434:11434"
    # On first start, pull models (comma-separated). Defaults to same as OLLAMA_MODEL used by agent-framework.
    # Example extra models: OLLAMA_PULL_MODELS=phi3:mini,llava:7b
    environment:
      - OLLAMA_PULL_MODELS=${OLLAMA_PULL_MODELS:-${OLLAMA_MODEL:-phi3:mini}}
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - tr -d '\r' < /app/Execution_scripts/ollama_docker_entrypoint.sh > /tmp/ollama_docker_entrypoint.sh && chmod +x /tmp/ollama_docker_entrypoint.sh && /bin/sh /tmp/ollama_docker_entrypoint.sh
    volumes:
      - D:/data/ollama-data:/root/.ollama
      - ./Execution_scripts:/app/Execution_scripts:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - agent-network

  qwen3-tts:
    image: ${QWEN3_TTS_IMAGE:-qwen3-tts-api:blackwell-local}
    build:
      context: ./external/qwen3-tts-api
      dockerfile: Dockerfile.blackwell
    container_name: qwen3-tts
    ports:
      - "8880:8880"
    environment:
      - PORT=8880
      - HOST=0.0.0.0
      - DEVICE=cuda:0
      - DTYPE=bfloat16
      - USE_FLASH_ATTENTION=false
      - MODEL_NAME=Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice
      - MODEL_CACHE_DIR=/cache
      - LOCAL_FILES_ONLY=false
      - HF_HOME=/cache
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - qwen3-tts-cache:/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - agent-network

  agent-framework:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: agent-framework
    ports:
      - "8000:8000"
      - "${INTERACTION_WS_PORT:-8001}:${INTERACTION_WS_PORT:-8001}"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./Execution_scripts:/app/Execution_scripts
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3:mini}
      - TZ=${TZ:-America/New_York}
      - APP_TIMEZONE=${APP_TIMEZONE:-America/New_York}
      - TTS_BASE_URL=http://qwen3-tts:8880
      - TTS_MODEL=Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice
      - TTS_VOICE=Ono_Anna
      - TTS_RESPONSE_FORMAT=wav
      - MOUTH_INTERVAL_MS=150
      - MOUTH_OPEN_VALUE=0.5
      - MOUTH_CLOSED_VALUE=0.0
      - INTERACTION_WS_PORT=${INTERACTION_WS_PORT:-8001}
      - INTERACTION_SCHEMA=head_pat_v1
      - INTERACTION_AUTO_REACT=1
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-llava:7b}
      - STREAMER_VISION_MODEL=${STREAMER_VISION_MODEL:-llava:7b}
      - STREAMER_STT_ENABLED=${STREAMER_STT_ENABLED:-0}
      - STREAMER_TTS_ENABLED=${STREAMER_TTS_ENABLED:-0}
      - STREAMER_OBS_HOST=${STREAMER_OBS_HOST:-host.docker.internal}
      - STREAMER_OBS_PORT=${STREAMER_OBS_PORT:-4455}
      - STREAMER_OBS_PASSWORD=${STREAMER_OBS_PASSWORD:-}
      - STREAMER_OBS_SOURCE_NAME=${STREAMER_OBS_SOURCE_NAME:-}
      - STREAMER_OBS_WIDTH=${STREAMER_OBS_WIDTH:-960}
      - STREAMER_OBS_HEIGHT=${STREAMER_OBS_HEIGHT:-540}
      - STREAMER_OBS_MIN_INTERVAL_MS=${STREAMER_OBS_MIN_INTERVAL_MS:-400}
      - STREAMER_STT_MODEL_SIZE=${STREAMER_STT_MODEL_SIZE:-small}
      - STREAMER_STT_LANGUAGE=${STREAMER_STT_LANGUAGE:-en}
      - OUTLOOK_BRIDGE_URL=${OUTLOOK_BRIDGE_URL:-http://host.docker.internal:8765}
      - OUTLOOK_BRIDGE_TIMEOUT_SEC=${OUTLOOK_BRIDGE_TIMEOUT_SEC:-25}
    depends_on:
      - ollama
      - qwen3-tts
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  ollama-data:
    driver: local
  qwen3-tts-cache:
    driver: local

networks:
  agent-network:
    driver: bridge